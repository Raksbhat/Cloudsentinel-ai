
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CloudSentinel AI</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #0a0e1a;
  color: #e2e8f0;
  font-family: 'Segoe UI', sans-serif;
}

.header {
  background: #0f1628;
  border-bottom: 1px solid #1e3a5f;
  padding: 16px 32px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
}
.logo {
  font-size: 24px;
  font-weight: 700;
  color: #38bdf8;
}
.logo span {
  color: #f43f5e;
}
.status-badge {
  background: #052e16;
  color: #4ade80;
  border: 1px solid #166534;
  padding: 4px 12px;
  border-radius: 20px;
  font-size: 12px;
}

.container {
  padding: 32px;
  max-width: 1200px;
  margin: 0 auto;
}

.stats {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 16px;
  margin-bottom: 32px;
}

.stat-card {
  background: #0f1628;
  border: 1px solid #1e3a5f;
  border-radius: 8px;
  padding: 20px;
  transition: transform 0.3s ease, box-shadow 0.3s ease;
}
.stat-card:hover {
  transform: translateY(-4px);
  box-shadow: 0 8px 16px rgba(0,0,0,0.4);
}

.stat-label {
  font-size: 12px;
  color: #64748b;
  text-transform: uppercase;
  letter-spacing: 1px;
}
.stat-value {
  font-size: 32px;
  font-weight: 700;
  margin-top: 8px;
}
.total { color: #38bdf8; }
.critical { color: #f43f5e; }
.high     { color: #fb923c; }
.medium   { color: #fbbf24; }
.low      { color: #4ade80; } /* New color for Low severity */

.section-title {
  font-size: 14px;
  color: #94a3b8;
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-top: 32px;
  margin-bottom: 16px;
}

.finding-card {
  background: #0f1628;
  border: 1px solid #1e3a5f;
  border-radius: 8px;
  padding: 20px;
  margin-bottom: 12px;
  display: flex;
  align-items: flex-start;
  gap: 16px;
  cursor: pointer;
  transition: transform 0.2s ease, background 0.2s ease;
}
.finding-card:hover {
  transform: translateY(-2px);
  background: #141b2e;
  box-shadow: 0 4px 8px rgba(0,0,0,0.6);
}

.severity-badge {
  padding: 4px 10px;
  border-radius: 4px;
  font-size: 11px;
  font-weight: 700;
  white-space: nowrap;
}
.sev-critical {
  background: #450a0a;
  color: #f43f5e;
  border: 1px solid #f43f5e;
}
.sev-high {
  background: #431407;
  color: #fb923c;
  border: 1px solid #fb923c;
}
.sev-medium {
  background: #422006;
  color: #fbbf24;
  border: 1px solid #fbbf24;
}

/* Additional UI tag styles */
.source-tag {
  background: #1e293b;
  color: #64748b;
  font-size: 12px;
  padding: 2px 6px;
  border-radius: 4px;
  margin-right: 8px;
}
.remediate-btn {
  margin-top: 10px;
  background: #7f1d1d;
  color: white;
  border: 1px solid #991b1b;
  border-radius: 4px;
  font-size: 13px;
  padding: 6px 12px;
  cursor: pointer;
}
.remediate-btn:hover {
  background: #991b1b;
}
.ai-hint {
  margin-top: 10px;
  color: #38bdf8;
  font-size: 12px;
}
.mitre-tag {
  display: inline-block;
  margin-top: 8px;
  padding: 4px 8px;
  background: #1e293b;
  border: 1px solid #38bdf8;
  border-radius: 4px;
  color: #38bdf8;
  font-size: 11px;
}

</style>
</head>
<body>

<div class="header">
  <div class="logo">Cloud<span>Sentinel</span> AI</div>
  <div class="status-badge">● LIVE</div>
</div>

<div class="container">
  <div id="demo-banner"></div>

  <div class="stats">
    <div class="stat-card">
      <div class="stat-label">Total Findings</div>
      <div class="stat-value total" id="total">-</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Critical</div>
      <div class="stat-value critical" id="critical">-</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">High</div>
      <div class="stat-value high" id="high">-</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Medium</div>
      <div class="stat-value medium" id="medium">-</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Low</div>
      <div class="stat-value low" id="low">-</div>
    </div>
  </div>

  <div class="section-title">Security Findings</div>
  <div id="findings">
    <div class="loading">Loading findings...</div>
  </div>
</div>

<br><br>
<div class="section-title">CloudTrail Detections</div>
<div id="cloudtrail"></div>

<script>
const API = "https://s1lbua66dj.execute-api.eu-north-1.amazonaws.com";
let findingsCache = [];

/* Helper functions for severity */
function getSeverityClass(sev) {
  if (sev === "Critical") return "sev-critical";
  if (sev === "High")     return "sev-high";
  // Treat Medium/Low as medium-style for now
  return "sev-medium";
}
function getSeverityLabel(sev) {
  return sev.toUpperCase();
}

/* Load findings from API and render */
async function loadFindings() {
  try {
    const res = await fetch(`${API}/findings`);
    const data = await res.json();
    findingsCache = data.findings || [];
    document.getElementById("total").textContent = data.total || findingsCache.length;
    document.getElementById("critical").textContent =
      findingsCache.filter(f => f.severity === "Critical").length;
    document.getElementById("high").textContent =
      findingsCache.filter(f => f.severity === "High").length;
    document.getElementById("medium").textContent =
      findingsCache.filter(f => f.severity === "Medium").length;
    document.getElementById("low").textContent =
      findingsCache.filter(f => f.severity === "Low").length;

    document.getElementById("findings").innerHTML =
      findingsCache.map((f, index) => `
      <div class="finding-card" onclick="explainFinding(${index})">
        <span class="severity-badge ${getSeverityClass(f.severity)}">
          ${getSeverityLabel(f.severity)}
        </span>
        <div>
          <div class="finding-title">${f.title}</div>
          <div class="finding-type">${f.type}</div>
          <div class="finding-desc">${f.description}</div>
          <div class="finding-meta">
            <span class="source-tag">${f.source}</span>
            ${f.timestamp}
          </div>
          <div class="ai-hint">🤖 Click for AI Analysis</div>
          <button class="remediate-btn"
                  onclick="event.stopPropagation(); remediateFinding(${index})">
            🛡 Remediate
          </button>
        </div>
      </div>
      `).join("");
  } catch (e) {
    document.getElementById("findings").innerHTML =
      `<div class="loading">Error: ${e.message}</div>`;
  }
}

/* Load CloudTrail detections (no changes needed here) */
async function loadCloudTrailDetections() {
  try {
    const res = await fetch(`${API}/cloudtrail-detections`);
    const data = await res.json();
    document.getElementById("cloudtrail").innerHTML =
      (data.findings || []).map(f => `
      <div class="finding-card">
        <span class="severity-badge ${
          f.severity === "Critical" ? "sev-critical"
          : f.severity === "High"     ? "sev-high"
          : "sev-medium"
        }">${f.severity}</span>
        <div>
          <div class="finding-title">${f.title}</div>
          <div class="finding-type">${f.type}</div>
          <div class="finding-desc">${f.description}</div>
          <div class="finding-meta">
            <span class="source-tag">${f.source}</span>
            ${f.timestamp}
          </div>
        </div>
      </div>
      `).join("");
  } catch (e) {
    document.getElementById("cloudtrail").innerHTML =
      `<div class="loading">Error: ${e.message}</div>`;
  }
}

/* Event handlers (AI analysis and remediation) */
async function explainFinding(index) {
  const finding = findingsCache[index];
  try {
    const res = await fetch(`${API}/ai/explain`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ finding })
    });
    const data = await res.json();
    if (data.error) {
      alert("AI Error:\n\n" + data.error);
      return;
    }
    const e = data.explanation;
    alert(
      "🔍 WHAT HAPPENED\n\n" + e.what_happened +
      "\n\n⚠️ WHY DANGEROUS\n\n" + e.why_dangerous +
      "\n\n🎯 ATTACKER GOAL\n\n" + e.attacker_goal +
      "\n\n🚨 IMMEDIATE ACTION\n\n" + e.immediate_action +
      "\n\n🛠️ REMEDIATION\n\n" + e.remediation.join("\n")
    );
  } catch (e) {
    alert("AI Error:\n\n" + e.message);
  }
}

async function remediateFinding(index) {
  const finding = findingsCache[index];
  await fetch(`${API}/findings/remediate`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ finding })
  });
  loadFindings();
}

/* Auto-refresh data */
loadFindings();
loadCloudTrailDetections();
setInterval(() => {
  loadFindings();
  loadCloudTrailDetections();
}, 30000);
</script>

</body>
</html>
